version: 2
# Config calmada: mensual, agrupa solo minor/patch (seguros) e IGNORA majors.
# Los bumps major son los que rompían el build CommonJS de apps/api (paquetes
# ESM-only) y disparaban deploys de preview fallidos en Vercel. Si algún día se
# necesita un major, se hace a mano y con cuidado (ver CLAUDE.md "Nunca romper").
updates:
  # Root workspace
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Web app
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - frontend
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # API (CommonJS — sensible a majors ESM-only)
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - backend
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - ci
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
