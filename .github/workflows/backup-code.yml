name: Backup Code + Assets

# ============================================================================
# Respaldo diario de código (bundle Git con historial completo), assets de
# Supabase Storage y manifiesto de variables de entorno (sin valores).
#
# HORARIO MÉXICO: 03:09 MX -> 09:09 UTC -> cron "9 9 * * *"
# (fuera de la ventana de los backups de BD, 12:09 y 19:09 MX; minuto :09 para
#  evitar la congestión de GitHub al inicio de hora).
#
# ⚠️ GitHub Actions corre en UTC; el dead-man's switch cubre retrasos/saltos.
# ============================================================================

on:
  schedule:
    - cron: "9 9 * * *"    # 03:09 America/Mexico_City
  workflow_dispatch:
    inputs:
      dry_run:
        description: "1 = subir a prefijo test/"
        required: false
        default: "0"

concurrency:
  group: backup-code
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
      AGE_PUBLIC_KEY:       ${{ secrets.AGE_PUBLIC_KEY }}
      HEALTHCHECKS_URL_CODE: ${{ secrets.HEALTHCHECKS_URL_CODE }}
      RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
      ALERT_EMAIL:          ${{ secrets.ALERT_EMAIL }}
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DRY_RUN:              ${{ github.event.inputs.dry_run }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # historial completo para el bundle

      - name: Instalar dependencias (age + aws si falta)
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y -qq age >/dev/null
          if ! command -v aws >/dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp && sudo /tmp/aws/install
          fi
          age --version && aws --version

      - name: Ejecutar backup de código + assets
        run: bash scripts/backup/backup-code-assets.sh
