name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6 AM UTC

jobs:
  # ── 1. Secret scan ─────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history required for historical secret detection
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Dependency audit ────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10 # match packageManager in package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run pnpm audit (critical only)
        # No critical vulns — only low/moderate from transitive deps (exit 0).
        # glob override already applied via pnpm.overrides in root package.json.
        run: pnpm audit --audit-level=critical
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL
          exit-code: '1'

  # ── 3. Static Analysis (CodeQL) ────────────────────────────────────────────
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4

  # ── 4. RLS check ────────────────────────────────────────────────────────────
  rls-check:
    name: Supabase RLS Check
    runs-on: ubuntu-latest
    # Skip gracefully when the secret is not configured in this repo/environment.
    # To enable: add DATABASE_URL (direct Supabase connection string) to GitHub Secrets.
    if: ${{ secrets.DATABASE_URL != '' }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install pg driver
        # Use --prefix to install outside the pnpm workspace so npm doesn't
        # choke on workspace:* protocol entries in package.json.
        run: npm install --prefix /tmp/pg pg
      - name: Check RLS policies
        run: NODE_PATH=/tmp/pg/node_modules node scripts/check-rls.js
