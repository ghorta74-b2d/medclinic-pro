name: Backup DB

# ============================================================================
# Dos backups completos diarios de la BD, "sin excepción".
# Export lógico vía API de Supabase (PostgREST + Auth Admin API) sobre HTTPS —
# no requiere password de BD ni conexión Postgres directa (ver export-db.py).
#
# HORARIO MÉXICO (America/Mexico_City = UTC-6 fijo, SIN horario de verano):
#   12:09 MX  ->  18:09 UTC   ->  cron "9 18 * * *"
#   19:09 MX  ->  01:09 UTC   ->  cron "9 1  * * *"  (cae al día siguiente UTC)
#
# Nota: el minuto :09 (no :00) es recomendación de GitHub — el inicio de hora
# es el horario más congestionado y donde más se retrasan/saltan los schedules.
#
# ⚠️ GitHub Actions corre SIEMPRE en UTC y sus schedules pueden retrasarse o
#    saltarse. Por eso el dead-man's switch en healthchecks.io es OBLIGATORIO.
# ============================================================================

on:
  schedule:
    - cron: "9 18 * * *"   # 12:09 America/Mexico_City
    - cron: "9 1 * * *"    # 19:09 America/Mexico_City (día anterior)
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot forzado (1200 o 1900). Vacío = automático por hora."
        required: false
        default: ""
      dry_run:
        description: "1 = subir a prefijo test/ y no purgar"
        required: false
        default: "0"

concurrency:
  group: backup-db
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      R2_ACCOUNT_ID:             ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:          ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:      ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET:                 ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT:               ${{ secrets.R2_ENDPOINT }}
      AGE_PUBLIC_KEY:            ${{ secrets.AGE_PUBLIC_KEY }}
      HEALTHCHECKS_URL_DB_1200:  ${{ secrets.HEALTHCHECKS_URL_DB_1200 }}
      HEALTHCHECKS_URL_DB_1900:  ${{ secrets.HEALTHCHECKS_URL_DB_1900 }}
      RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
      ALERT_EMAIL:               ${{ secrets.ALERT_EMAIL }}
      DRY_RUN:                   ${{ github.event.inputs.dry_run }}

    steps:
      - uses: actions/checkout@v6

      # El slot se fija por el CRON que disparó (no por la hora de ejecución),
      # porque GitHub retrasa los schedules de forma variable y eso provocaba
      # que un run de las 19:09 atrasado se auto-etiquetara como 1200 (colisión).
      - name: Determinar slot
        run: |
          case "${{ github.event.schedule }}" in
            "9 18 * * *") echo "BACKUP_SLOT=1200" >> "$GITHUB_ENV" ;;
            "9 1 * * *")  echo "BACKUP_SLOT=1900" >> "$GITHUB_ENV" ;;
            *)            echo "BACKUP_SLOT=${{ github.event.inputs.slot || '1200' }}" >> "$GITHUB_ENV" ;;
          esac

      - name: Instalar dependencias (age + aws si falta)
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y -qq age >/dev/null
          if ! command -v aws >/dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp && sudo /tmp/aws/install
          fi
          age --version && aws --version

      - name: Ejecutar backup de BD
        run: bash scripts/backup/backup-db.sh
