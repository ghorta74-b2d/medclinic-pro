name: Verify Backup

# ============================================================================
# Verificación SEMANAL de integridad del último backup almacenado en R2,
# SIN descifrar (no usa la clave privada). El ensayo de restauración real con
# descifrado es MENSUAL y MANUAL (scripts/backup/restore-rehearsal.sh).
#
# HORARIO MÉXICO: lunes 04:09 MX -> 10:09 UTC -> cron "9 10 * * 1"
# ============================================================================

on:
  schedule:
    - cron: "9 10 * * 1"   # lunes 04:09 America/Mexico_City
  workflow_dispatch: {}

concurrency:
  group: verify-backup
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
      HEALTHCHECKS_URL_VERIFY: ${{ secrets.HEALTHCHECKS_URL_VERIFY }}
      RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
      ALERT_EMAIL:          ${{ secrets.ALERT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias (aws si falta)
        run: |
          set -e
          if ! command -v aws >/dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp && sudo /tmp/aws/install
          fi
          aws --version

      - name: Verificar integridad del último backup
        run: bash scripts/backup/verify-backup.sh
